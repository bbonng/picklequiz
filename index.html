<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피클볼 코트의 비밀 — 서술형 평가 전 활동</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --court:#1C3D6E;          /* 코트 딥 블루 (배경) */
  --court-panel:#2A5694;    /* 코트 면 */
  --kitchen:#3E7D5F;        /* 키친 그린 */
  --line:#F4F1E6;           /* 코트 라인 화이트 */
  --ball:#DCE94A;           /* 피클볼 옵틱 옐로 */
  --ball-deep:#B8C426;
  --ink:#11253F;
  --correct:#54C189;
  --wrong:#E5694F;
  --dim:rgba(244,241,230,.55);
  --shadow:0 18px 50px rgba(5,15,32,.45);
  --r-lg:22px; --r-md:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Noto Sans KR",sans-serif;
  background:var(--court);
  color:var(--line);
  overflow:hidden;
  user-select:none;
}
/* ── 코트 배경: 라인 + 키친 존 ───────────────────── */
.court-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.court-bg .side{position:absolute;top:0;bottom:0;width:9vw;background:var(--kitchen);opacity:.5}
.court-bg .side.l{left:0;border-right:4px solid rgba(244,241,230,.35)}
.court-bg .side.r{right:0;border-left:4px solid rgba(244,241,230,.35)}
.court-bg .baseline{position:absolute;left:9vw;right:9vw;height:4px;background:rgba(244,241,230,.28)}
.court-bg .baseline.top{top:7vh}
.court-bg .baseline.bottom{bottom:7vh}
.court-bg .center{position:absolute;top:7vh;bottom:7vh;left:50%;width:3px;background:rgba(244,241,230,.14)}
.nvz-label{
  position:absolute;bottom:2.2vh;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.42em;color:rgba(244,241,230,.35);font-weight:700;white-space:nowrap;
}
/* ── 공통 레이아웃 ──────────────────────────────── */
#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:18px 5vw 0;min-height:64px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;letter-spacing:.02em}
.brand svg{display:block}
.progress{display:flex;gap:7px;align-items:center}
.pball{width:17px;height:17px;border-radius:50%;border:2px solid rgba(244,241,230,.35);position:relative;transition:all .3s}
.pball.done{background:var(--ball);border-color:var(--ball)}
.pball.done::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(circle 1.6px at 30% 32%, var(--ball-deep) 95%, transparent),
    radial-gradient(circle 1.6px at 65% 28%, var(--ball-deep) 95%, transparent),
    radial-gradient(circle 1.6px at 48% 58%, var(--ball-deep) 95%, transparent),
    radial-gradient(circle 1.6px at 26% 70%, var(--ball-deep) 95%, transparent),
    radial-gradient(circle 1.6px at 72% 66%, var(--ball-deep) 95%, transparent);
}
.pball.now{border-color:var(--ball);box-shadow:0 0 0 4px rgba(220,233,74,.18)}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;min-width:120px}
.badge{
  font-size:12px;font-weight:800;color:var(--ink);background:var(--ball);
  padding:6px 12px;border-radius:999px;display:flex;align-items:center;gap:6px;
  animation:pop .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 12px rgba(0,0,0,.3);white-space:nowrap;
}
.badge.gold{background:linear-gradient(135deg,#FFE27A,#F0B53B);}
@keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 5vw 9vh;overflow:hidden}
.screen{width:min(1080px,100%);animation:rise .45s ease both}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
/* ── 시작 화면 ──────────────────────────────────── */
.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:5vw;align-items:center}
.eyebrow{font-size:13px;font-weight:800;letter-spacing:.34em;color:var(--ball);margin-bottom:14px}
h1.display{
  font-family:"Black Han Sans","Pretendard Variable",sans-serif;font-weight:400;
  font-size:clamp(44px,6.4vw,84px);line-height:1.06;letter-spacing:-.01em;margin-bottom:20px;
}
h1.display .y{color:var(--ball)}
.hero p.lead{font-size:clamp(15px,1.4vw,18px);line-height:1.75;color:var(--dim);max-width:46ch;margin-bottom:30px}
.hero p.lead b{color:var(--line);font-weight:700}
.btnrow{display:flex;gap:14px;flex-wrap:wrap}
.btn{
  font:inherit;font-weight:800;font-size:17px;border:none;cursor:pointer;
  padding:17px 34px;border-radius:var(--r-md);transition:transform .15s,box-shadow .15s,opacity .2s;
  letter-spacing:.01em;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--ball);color:var(--ink);box-shadow:0 10px 28px rgba(220,233,74,.28)}
.btn.primary:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--line);border:2px solid rgba(244,241,230,.4)}
.btn.ghost:hover{border-color:var(--line)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none}
.paddle-art{display:flex;justify-content:center}
/* ── 섹션 인트로 ────────────────────────────────── */
.section-intro{text-align:center}
.section-intro .num{
  font-family:"Black Han Sans",sans-serif;font-size:clamp(60px,9vw,120px);color:var(--ball);
  line-height:1;display:block;margin-bottom:8px;
}
.section-intro h2{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(30px,4vw,50px);margin-bottom:16px}
.section-intro p{color:var(--dim);font-size:clamp(15px,1.4vw,18px);line-height:1.7;max-width:52ch;margin:0 auto 34px}
.section-intro p b{color:var(--line)}
/* ── 문항 화면 ──────────────────────────────────── */
.qhead{display:flex;align-items:baseline;gap:14px;margin-bottom:18px}
.qnum{font-family:"Black Han Sans",sans-serif;font-size:clamp(30px,3.4vw,44px);color:var(--ball);line-height:1}
.qtag{font-size:13px;font-weight:800;letter-spacing:.22em;color:var(--dim)}
.qcard{
  background:var(--court-panel);border:2px solid rgba(244,241,230,.18);
  border-radius:var(--r-lg);padding:clamp(22px,3vw,38px);box-shadow:var(--shadow);
}
.qtext{font-size:clamp(19px,2.05vw,27px);font-weight:800;line-height:1.55;word-break:keep-all}
.qsub{margin-top:14px;background:rgba(17,37,63,.45);border-left:4px solid var(--ball);
  border-radius:0 var(--r-md) var(--r-md) 0;padding:14px 18px;font-size:clamp(14px,1.35vw,17px);
  line-height:1.8;color:rgba(244,241,230,.9)}
.answers{margin-top:24px;display:grid;gap:13px}
.answers.ox{grid-template-columns:1fr 1fr;gap:18px}
.opt{
  font:inherit;text-align:left;cursor:pointer;border-radius:var(--r-md);
  border:2px solid rgba(244,241,230,.25);background:rgba(17,37,63,.35);color:var(--line);
  padding:17px 20px;font-size:clamp(15px,1.5vw,19px);font-weight:600;line-height:1.5;
  display:flex;align-items:center;gap:14px;transition:all .15s;word-break:keep-all;
}
.opt:hover{border-color:var(--ball);background:rgba(220,233,74,.07);transform:translateY(-1px)}
.opt .mk{flex:0 0 32px;height:32px;border-radius:50%;border:2px solid rgba(244,241,230,.4);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.opt.oxbtn{flex-direction:column;justify-content:center;padding:26px 16px;gap:8px;text-align:center}
.opt.oxbtn .big{font-family:"Black Han Sans",sans-serif;font-size:clamp(46px,5.5vw,66px);line-height:1}
.opt.oxbtn .lab{font-size:14px;color:var(--dim);font-weight:700}
.opt.oxbtn.o .big{color:var(--correct)} .opt.oxbtn.x .big{color:var(--wrong)}
/* ── 해설 화면 ──────────────────────────────────── */
.verdict{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.verdict .mark{
  font-family:"Black Han Sans",sans-serif;font-size:clamp(34px,4vw,52px);line-height:1;
}
.verdict.ok .mark{color:var(--correct)} .verdict.no .mark{color:var(--wrong)}
.verdict .vt{font-size:clamp(20px,2.2vw,28px);font-weight:800}
.verdict .vs{font-size:14px;color:var(--dim);font-weight:600;margin-top:3px}
.expl{
  background:var(--court-panel);border-radius:var(--r-lg);box-shadow:var(--shadow);
  border:2px solid rgba(244,241,230,.18);padding:clamp(20px,2.6vw,32px);
  max-height:52vh;overflow-y:auto;
}
.expl::-webkit-scrollbar{width:8px}.expl::-webkit-scrollbar-thumb{background:rgba(244,241,230,.25);border-radius:4px}
.expl h3{font-size:14px;letter-spacing:.2em;color:var(--ball);margin-bottom:10px;font-weight:800}
.expl p{font-size:clamp(15px,1.55vw,19px);line-height:1.85;word-break:keep-all}
.expl p b{color:var(--ball);font-weight:800}
.expl .mywrong{
  margin-bottom:18px;padding:14px 18px;border-radius:var(--r-md);
  background:rgba(229,105,79,.13);border-left:4px solid var(--wrong);
}
.expl .mywrong h3{color:var(--wrong)}
.expl .warnbox{margin-top:16px;padding:13px 17px;border-radius:var(--r-md);
  background:rgba(220,233,74,.1);border-left:4px solid var(--ball);font-size:clamp(14px,1.35vw,17px);line-height:1.75}
.nextrow{margin-top:22px;display:flex;justify-content:flex-end;align-items:center;gap:16px}
.nextrow .timer{font-size:14px;color:var(--dim);font-weight:700}
/* ── 요약 화면 ──────────────────────────────────── */
.summary{text-align:center}
.summary h2{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(30px,4.2vw,52px);margin-bottom:8px}
.summary .sub{color:var(--dim);margin-bottom:34px;font-size:clamp(14px,1.4vw,17px)}
.formula{display:flex;align-items:center;justify-content:center;gap:13px;flex-wrap:wrap;margin-bottom:30px}
.chip{background:var(--court-panel);border:2px solid var(--ball);color:var(--line);
  border-radius:999px;padding:13px 22px;font-weight:800;font-size:clamp(14px,1.5vw,18px);white-space:nowrap}
.formula .plus,.formula .arrow{font-family:"Black Han Sans",sans-serif;color:var(--ball);font-size:clamp(20px,2.4vw,30px)}
.result-chip{background:var(--ball);color:var(--ink);border-color:var(--ball);font-size:clamp(16px,1.8vw,21px);padding:15px 28px}
.summary .conclusion{font-size:clamp(16px,1.7vw,21px);line-height:1.8;max-width:56ch;margin:0 auto 26px;word-break:keep-all}
.summary .conclusion b{color:var(--ball)}
.summary .reflect{margin-top:4px;margin-bottom:36px;padding-top:22px;border-top:1px solid rgba(244,241,230,.22);color:var(--dim)}
.summary .reflect b{color:var(--line);font-size:1.06em}
.anskey{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:26px;text-align:left}
.anscard{background:var(--court-panel);border:2px solid rgba(244,241,230,.18);border-radius:var(--r-lg);
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.anshead{display:flex;align-items:center;gap:12px;padding:16px 20px;font-weight:800;
  font-size:clamp(15px,1.5vw,19px);background:rgba(17,37,63,.45);border-bottom:2px solid rgba(244,241,230,.14);word-break:keep-all;line-height:1.4}
.ansmk{flex:0 0 auto;font-family:"Black Han Sans",sans-serif;font-weight:400;color:var(--ink);
  background:var(--ball);border-radius:8px;padding:5px 11px;font-size:14px;white-space:nowrap}
.ansbody{padding:18px 20px}
.anschips{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:13px}
.anschips .chip{padding:8px 16px;font-size:clamp(13px,1.3vw,16px)}
.ansbody p{font-size:clamp(14px,1.4vw,17px);line-height:1.85;word-break:keep-all;color:rgba(244,241,230,.92)}
.ansbody p b{color:var(--ball)}
@media (max-width:860px){.anskey{grid-template-columns:1fr}}
/* ── 잠금 화면 ──────────────────────────────────── */
.lock{text-align:center}
.lock .icon{font-size:60px;margin-bottom:18px}
.lock h2{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(30px,4vw,48px);margin-bottom:14px}
.lock p{color:var(--dim);font-size:clamp(15px,1.5vw,19px);line-height:1.8}
.lock .reset{margin-top:48px;font-size:11px;color:rgba(244,241,230,.18);cursor:pointer}
/* ── 모달 ───────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(5,15,32,.72);display:flex;align-items:center;justify-content:center;z-index:50;animation:fade .2s}
@keyframes fade{from{opacity:0}}
.modal{background:var(--court-panel);border:2px solid rgba(244,241,230,.25);border-radius:var(--r-lg);
  padding:34px;max-width:430px;width:90%;text-align:center;box-shadow:var(--shadow)}
.modal h3{font-size:21px;font-weight:800;margin-bottom:12px}
.modal p{color:var(--dim);line-height:1.7;margin-bottom:24px;font-size:15px}
.modal .btnrow{justify-content:center}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:760px){
  .hero{grid-template-columns:1fr}
  .paddle-art{display:none}
  .court-bg .side{width:5vw}
  .topbar{flex-wrap:wrap}
}
</style>
</head>
<body>
<div class="court-bg" aria-hidden="true">
  <div class="side l"></div><div class="side r"></div>
  <div class="baseline top"></div><div class="baseline bottom"></div>
  <div class="center"></div>
  <div class="nvz-label">NON-VOLLEY ZONE · KITCHEN</div>
</div>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="11" fill="#DCE94A"/><circle cx="9" cy="9" r="1.7" fill="#B8C426"/><circle cx="16" cy="8" r="1.7" fill="#B8C426"/><circle cx="13" cy="14" r="1.7" fill="#B8C426"/><circle cx="8" cy="16" r="1.7" fill="#B8C426"/><circle cx="17.5" cy="15.5" r="1.7" fill="#B8C426"/></svg>
      피클볼 코트의 비밀
    </div>
    <div class="progress" id="progress" aria-label="진행 상황"></div>
    <div class="badges" id="badges"></div>
  </div>
  <div class="stage"><div class="screen" id="screen"></div></div>
</div>
<script>
"use strict";
/* ════════════════════════════════════════════════════
   교사 설정
   VIDEO_URL : 경기 영상 다시 보기 링크 (유튜브 주소로 교체)
   RESET_CODE: 잠금 해제용 교사 코드 (다음 반 시작 전 초기화)
   ════════════════════════════════════════════════════ */
const VIDEO_URL  = "https://youtu.be/1Ukg3bKuGDw?si=X7rB4gmlzetOdbzs";
const RESET_CODE = "2026";
const LOCK_KEY   = "pb2026_lock";

/* ── 문항 데이터 ─────────────────────────────────── */
const QUESTIONS = [
{ type:"ox", tag:"1부 · 머리 풀기", q:"테니스, 배구, 탁구 같은 네트형 경기에서 서브는 단순히 경기를 시작하는 행위일 뿐, 공격 수단은 아니다.",
  answer:1,
  expl:"네트형 경기에서 서브는 <b>공격의 시작</b>이다. 테니스는 200km/h가 넘는 강서브로 상대에게 리턴할 틈을 주지 않고, 배구는 점프 서브로 상대 리시브를 흔들며, 탁구는 회전 서브로 3구 공격을 설계한다.",
  warn:"그런데 피클볼은? 이 질문을 기억하며 다음 문제로." },
{ type:"ox", tag:"1부 · 머리 풀기", q:"피클볼 공에 뚫린 구멍은 공을 가볍게 만들기 위한 장식적 요소다.",
  answer:1,
  expl:"구멍은 피클볼의 경기 양상을 결정하는 <b>핵심 설계</b>다. 공이 날아갈 때 구멍으로 공기가 통과하면서 공기저항이 커지고, 공의 속도가 크게 줄어든다. 같은 힘으로 쳐도 테니스공보다 훨씬 느리게 날아가기 때문에 상대가 반응할 시간이 생기고, <b>랠리가 길어진다</b>.",
  warn:"이 공은 원래 '위플볼'이라는 어린이용 야구 연습공에서 왔다." },
{ type:"ox", tag:"1부 · 머리 풀기", q:"피클볼 서브는 반드시 허리 아래에서 위로 올려치는 언더핸드로 넣어야 한다.",
  answer:0,
  expl:"맞다. 팔이 아래에서 위로 향하는 궤적으로, 타구점이 허리(배꼽) 아래여야 한다. 테니스처럼 머리 위에서 내리꽂는 서브는 반칙이다. 왜 이런 규칙을 만들었을까? 서브가 너무 강력하면 서브 한 방에 점수가 나고 랠리가 사라진다. 피클볼은 처음부터 <b>\"누구나 길게 주고받으며 즐기는 경기\"</b>가 되도록 서브의 위력을 규칙으로 묶어둔 것이다." },
{ type:"ox", tag:"1부 · 머리 풀기", q:"피클볼 네트 앞에는 들어가면 안 되는 구역이 있는데, 이 구역에서는 어떤 플레이도 할 수 없다.",
  answer:1,
  expl:"절반만 맞는 말이라 X다. 네트 앞 2.13m(7피트) 구역을 <b>논발리존</b>, 별명으로 <b>키친(kitchen)</b>이라 부른다. 이 구역에서 금지되는 것은 <b>발리(노바운드로 공을 직접 치는 것)</b>뿐이다. 공이 키친에 한 번 튀었다면 키친 안에 들어가서 쳐도 된다. \"들어가면 무조건 반칙\"이 아니라 <b>\"그 안에서 발리하면 반칙\"</b> — 이 구분이 매우 중요하다.",
  warn:"⚠️ 많은 초보자가 키친에 서서 발리 스매시를 하다가 반칙을 범한다." },

  const p = $("#progress");
  p.innerHTML = QUESTIONS.map((_,i)=>{
    const c = i < idx ? "done" : (i === idx ? "now" : "");
    return `<div class="pball ${c}"></div>`;
  }).join("");
}
function renderBadges(){
  $("#badges").innerHTML = earned.map(b=>

}

function showSectionIntro(n){
  const data = n===1
    ? {num:"1부", t:"머리 풀기 · OX", d:"네트형 경기의 공통점과 피클볼의 첫인상. <b>틀려도 괜찮다</b> — 해설이 더 중요하다. 다섯 문제."}
    : n===2
    ? {num:"2부", t:"핵심 규칙 · 4지선다", d:"이제부터 진짜다. 문제를 통과할 때마다 <b>핵심 용어 배지</b>가 위에 쌓인다. 이 배지 네 개가 시험 답안의 뼈대다. 네 문제."}
    : {num:"FINAL", t:"보스 문제", d:"피클볼을 처음 치는 친구가 코트에 들어왔다. <b>무엇이 반칙인지 판정하라.</b> 이걸 맞히면 어디 가서 피클볼 친다고 말해도 된다."};
  screen.innerHTML = `
  <div class="section-intro">
    <span class="num">${data.num}</span>
    <h2>${data.t}</h2>
    <p>${data.d}</p>
    <button class="btn primary" onclick="renderQuestion()">문제 풀기</button>
  </div>`;
}

function startQuiz(){ idx = 0; renderProgress(); showSectionIntro(1); }

function renderQuestion(){
  renderProgress();
  const Q = QUESTIONS[idx];
  const head = `<div class="qhead"><div class="qnum">Q${idx+1}</div><div class="qtag">${Q.tag}${Q.type==='ox'?' · OX':''}</div></div>`;
  let body = `<div class="qcard"><div class="qtext">${Q.q}</div>`;
  if(Q.sub) body += `<div class="qsub">${Q.sub}</div>`;
  if(Q.type==="ox"){
    body += `<div class="answers ox">
      <button class="opt oxbtn o" onclick="answer(0)"><span class="big">O</span><span class="lab">맞다</span></button>
      <button class="opt oxbtn x" onclick="answer(1)"><span class="big">X</span><span class="lab">아니다</span></button>
    </div>`;
  }else{
    const mks = ["①","②","③","④"];
    body += `<div class="answers">` + Q.options.map((o,i)=>
      `<button class="opt" onclick="answer(${i})"><span class="mk">${mks[i]}</span><span>${o}</span></button>`).join("") + `</div>`;
  }
  body += `</div>`;
  screen.innerHTML = head + body;
}

function answer(sel){
  const Q = QUESTIONS[idx];
  const ok = sel === Q.answer;
  const mks = ["①","②","③","④"];
  let inner = "";
  if(Q.type==="mc" && !ok && Q.explWrong && Q.explWrong[sel]){
    inner += `<div class="mywrong"><h3>내가 고른 ${mks[sel]}이 틀린 이유</h3><p>${Q.explWrong[sel]}</p></div>`;
  }
  const correctLabel = Q.type==="ox" ? (Q.answer===0?"O":"X") : mks[Q.answer]+" "+Q.options[Q.answer];
  inner += `<h3>정답 ${correctLabel} — 해설</h3><p>${Q.type==="ox"?Q.expl:Q.explCorrect}</p>`;
  if(Q.warn) inner += `<div class="warnbox">${Q.warn}</div>`;
  screen.innerHTML = `
  <div class="verdict ${ok?'ok':'no'}">
    <div class="mark">${ok?'O':'X'}</div>
    <div><div class="vt">${ok?'정답!':'아쉽다, 오답'}</div>
    <div class="vs">${ok?'맞혔어도 해설을 읽자 — 답안의 재료가 들어 있다':'지금이 배울 기회다. 해설을 천천히 읽자'}</div></div>
  </div>
  <div class="expl">${inner}</div>
  <div class="nextrow">
    <span class="timer" id="timer">해설 확인 중… 5초</span>
    <button class="btn primary" id="nextBtn" disabled onclick="next()">다음 →</button>
  </div>`;
  let t = 5;
  const tm = setInterval(()=>{
    t--;
    const el = $("#timer");
    if(!el){ clearInterval(tm); return; }
    if(t<=0){ clearInterval(tm); el.textContent=""; const b=$("#nextBtn"); if(b) b.disabled=false; }
    else el.textContent = `해설 확인 중… ${t}초`;
  },1000);
  if(Q.badge && !earned.includes(Q.badge)){ earned.push(Q.badge); renderBadges(); }
}

function next(){
  idx++;
  renderProgress();
  if(idx===5) showSectionIntro(2);
  else if(idx===9) showSectionIntro(3);
  else if(idx>=QUESTIONS.length) showSummary();
  else renderQuestion();
}

    네트 앞 강타가 금지되니 딩크전이 펼쳐진다(<b>키친</b>).</p>
    <p class="conclusion reflect">잠시 멈추고 스스로에게 물어보자.<br>
    <b>나는 이 연결고리를 누군가에게 설명할 수 있는가?</b><br>
    설명할 수 있다면 — 언제 어느 코트에서라도 부끄럽지 않은 플레이어다.</p>
    <button class="btn primary" onclick="confirmEnd()">활동 종료</button>
  </div>`;
}

function confirmEnd(){
  const m = document.createElement("div");
  m.className = "modal-bg";
  m.innerHTML = `<div class="modal">
    <h3>활동을 종료할까?</h3>
    <p>종료하면 다시 돌아올 수 없다.<br>요약 화면을 충분히 봤다면, 선생님의 시작 신호에 맞춰 종료하자.</p>
    <div class="btnrow">
      <button class="btn ghost" onclick="this.closest('.modal-bg').remove()">더 보기</button>
      <button class="btn primary" onclick="lockNow()">종료한다</button>
    </div></div>`;
  document.body.appendChild(m);
}

function lockNow(){
  try{ localStorage.setItem(LOCK_KEY,"1"); }catch(e){}
  document.querySelectorAll(".modal-bg").forEach(e=>e.remove());
  showLock();
}

function showLock(){
  $("#progress").innerHTML=""; $("#badges").innerHTML="";
  screen.innerHTML = `
  <div class="lock">
    <div class="icon">🏓</div>
    <h2>수고했습니다</h2>
    <p>웨일북을 <b style="color:var(--line)">덮고</b> 선생님의 안내를 기다리세요.<br>
    이제 머릿속의 단서로 답안을 쓸 시간입니다.</p>
    <div class="reset" id="resetZone">·</div>
  </div>`;
  let taps = 0, last = 0;
  $("#resetZone").addEventListener("click",()=>{
    const now = Date.now();
    taps = (now - last < 1500) ? taps+1 : 1; last = now;
    if(taps>=5){
      taps = 0;
      const code = prompt("교사용 초기화 코드");
      if(code === RESET_CODE){ try{ localStorage.removeItem(LOCK_KEY);}catch(e){} earned=[]; showStart(); }
    }
  });
}

/* ── 초기화 ──────────────────────────────────────── */
(function init(){
  const params = new URLSearchParams(location.search);
  if(params.get("reset") === RESET_CODE){
    try{ localStorage.removeItem(LOCK_KEY); }catch(e){}
    history.replaceState(null,"",location.pathname);
  }
  let locked = false;
  try{ locked = localStorage.getItem(LOCK_KEY)==="1"; }catch(e){}
  renderProgress(); renderBadges();
  locked ? showLock() : showStart();
})();
window.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
